name: fluidify_mobile
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.5.4

dependencies:
  flutter:
    sdk: flutter
  smooth_page_indicator: ^2.0.1
  google_fonts: ^8.0.2
  supabase_flutter: ^2.12.0
  video_player: ^2.11.1
  flutter_gemini: ^3.0.0
  flutter_math_fork: ^0.7.4
  flutter_markdown: ^0.7.7+1
  markdown: ^7.3.1
  file_picker: ^11.0.2
  flutter_launcher_icons: ^0.14.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/img/
    - assets/img/onboarding/
    - assets/img/custom_icons/
    - assets/videos/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/img/custom_icons/app_icon.png"
  # adaptive_icon_background: "#ffffff" # Optional for Android adaptive icons
  # adaptive_icon_foreground: "assets/icon/foreground.png" # Optional
